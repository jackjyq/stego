color_04: "#875f02" # Yellow (Command second)
color_05: "#0e5ed8" # Blue (Path)
color_06: "#9d37b3" # Magenta (Syntax var)
color_07: "#067277" # Cyan (Prompt)
color_08: "#fafafa" # White

color_09: "#424242" # Bright Black
color_10: "#d63d4d" # Bright Red (Command error)
